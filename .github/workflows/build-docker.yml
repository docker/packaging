name: build-docker

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - 'main'
      - 'docker/[0-9]+.[0-9]+'
    paths:
      - '.github/workflows/.build.yml'
      - '.github/workflows/build-docker.yml'
      - 'hack/scripts/**'
      - 'pkg/docker-engine/**'
      - 'pkg/docker-cli/**'
      - 'docker-bake.hcl'
  pull_request:
    branches:
      - 'main'
      - 'docker/[0-9]+.[0-9]+'
    paths:
      - '.github/workflows/.build.yml'
      - '.github/workflows/build-docker.yml'
      - 'hack/scripts/**'
      - 'pkg/docker-engine/**'
      - 'pkg/docker-cli/**'
      - 'docker-bake.hcl'

jobs:
  engine:
    uses: ./.github/workflows/.build.yml
    permissions:
      contents: read
      id-token: write
    with:
      name: docker-engine

  cli:
    uses: ./.github/workflows/.build.yml
    permissions:
      contents: read
      id-token: write
    with:
      name: docker-cli
