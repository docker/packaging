name: build-containerd

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - 'main'
      - 'containerd/[0-9]+.[0-9]+'
    paths:
      - '.github/workflows/.build.yml'
      - '.github/workflows/build-containerd.yml'
      - 'hack/scripts/**'
      - 'pkg/containerd/**'
      - 'docker-bake.hcl'
  pull_request:
    branches:
      - 'main'
      - 'containerd/[0-9]+.[0-9]+'
    paths:
      - '.github/workflows/.build.yml'
      - '.github/workflows/build-containerd.yml'
      - 'hack/scripts/**'
      - 'pkg/containerd/**'
      - 'docker-bake.hcl'

jobs:
  run:
    uses: ./.github/workflows/.build.yml
    permissions:
      contents: read
      id-token: write
    with:
      name: containerd
