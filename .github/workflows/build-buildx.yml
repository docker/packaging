name: build-buildx

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - 'main'
      - 'buildx/[0-9]+.[0-9]+'
    paths:
      - '.github/workflows/.build.yml'
      - '.github/workflows/build-buildx.yml'
      - 'hack/scripts/**'
      - 'pkg/buildx/**'
      - 'docker-bake.hcl'
  pull_request:
    branches:
      - 'main'
      - 'buildx/[0-9]+.[0-9]+'
    paths:
      - '.github/workflows/.build.yml'
      - '.github/workflows/build-buildx.yml'
      - 'hack/scripts/**'
      - 'pkg/buildx/**'
      - 'docker-bake.hcl'

jobs:
  run:
    uses: ./.github/workflows/.build.yml
    permissions:
      contents: read
      id-token: write
    with:
      name: buildx
